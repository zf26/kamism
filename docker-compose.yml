services:
  # ─── KamiSM 后端服务 ────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kamism-app
    restart: unless-stopped
    ports:
      - "9527:9527"
    extra_hosts:
      # Linux 宿主机访问：让容器内可以用 host.docker.internal 访问宿主机服务
      - "host.docker.internal:host-gateway"
    environment:
      # 连接宿主机上已有的 PG 和 Redis
      DATABASE_URL: postgres://kamism:${POSTGRES_PASSWORD}@host.docker.internal:5432/kamism
      REDIS_URL: redis://host.docker.internal:6379
      JWT_SECRET: ${JWT_SECRET}
      PORT: 9527
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-KamiSM}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      RUST_LOG: ${RUST_LOG:-info}

  # ─── 如果服务器上没有 PG 和 Redis，取消下面的注释 ──
