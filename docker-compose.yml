services:
  # ─── KamiSM 后端服务 ────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kamism-app
    restart: unless-stopped
    ports:
      - "9527:9527"
    depends_on:
      rabbitmq:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgres://kamism:${POSTGRES_PASSWORD}@host.docker.internal:5432/kamism
      REDIS_URL: redis://host.docker.internal:6379
      AMQP_URL: amqp://kamism:${RABBITMQ_PASSWORD}@rabbitmq:5672/%2f
      JWT_SECRET: ${JWT_SECRET}
      PORT: 9527
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-KamiSM}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      RUST_LOG: ${RUST_LOG:-info}

